name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, unit + integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @homework/shared build
      - run: pnpm -F @homework/card-api db:generate
      - run: pnpm -r typecheck
      - run: pnpm -r lint
      - run: pnpm -r test
        env:
          JWT_SECRET: ci-secret-32-bytes-min-length-aaaaa
          DATABASE_URL: file:./prisma/test.db
          TELEGRAM_BOT_TOKEN: 000000:ci-fake-token
          MINIAPP_PUBLIC_URL: https://example.test
          CARD_API_URL: http://localhost:4000

  e2e:
    name: Playwright happy path
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build all packages
        run: |
          pnpm -F @homework/shared build
          pnpm -F @homework/card-api db:generate
          pnpm -F @homework/card-api build
          pnpm -F @homework/miniapp-web build
          pnpm -F @homework/miniapp-server build
      - name: Migrate + seed card-api db
        env:
          DATABASE_URL: file:./prisma/dev.db
        run: |
          pnpm -F @homework/card-api exec prisma migrate deploy
          pnpm -F @homework/card-api db:seed
      - name: Start card-api
        env:
          NODE_ENV: production
          PORT: 4000
          JWT_SECRET: ci-secret-32-bytes-min-length-aaaaa
          DATABASE_URL: file:./prisma/dev.db
        run: |
          pnpm -F @homework/card-api start &
          for i in $(seq 1 30); do curl -sf http://localhost:4000/v1/health && break; sleep 1; done
      - name: Start miniapp-server
        env:
          NODE_ENV: production
          PORT: 3000
          TELEGRAM_BOT_TOKEN: 000000:ci-fake-token
          MINIAPP_PUBLIC_URL: https://example.test
          BOT_MODE: polling
          CARD_API_URL: http://localhost:4000
          STATIC_DIR: ${{ github.workspace }}/packages/miniapp-web/dist
        run: |
          pnpm -F @homework/miniapp-server start &
          for i in $(seq 1 30); do curl -sf http://localhost:3000/api/health && break; sleep 1; done
      - name: Install Playwright browsers
        run: pnpm -F @homework/e2e exec playwright install --with-deps chromium
      - name: Run e2e
        env:
          MINIAPP_BASE_URL: http://localhost:3000
          TELEGRAM_BOT_TOKEN: 000000:ci-fake-token
        run: pnpm -F @homework/e2e e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

  docker:
    name: Docker build smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build card-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.card-api
          push: false
          tags: homework/card-api:ci
          cache-from: type=gha,scope=card-api
          cache-to: type=gha,scope=card-api,mode=max
      - name: Build miniapp-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.miniapp-server
          push: false
          tags: homework/miniapp-server:ci
          cache-from: type=gha,scope=miniapp-server
          cache-to: type=gha,scope=miniapp-server,mode=max
